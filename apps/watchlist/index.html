<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自选股 · 投研一体机</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="quadrants">
    <section class="quadrant quadrant--tl" aria-label="资产总览">
      <header class="quadrant__head">资产总览</header>
      <div class="quadrant__stub">ISW-10 占位</div>
    </section>

    <section class="quadrant quadrant--tr" aria-label="自选股分类">
      <div id="watchlist-root"></div>
    </section>

    <section class="quadrant quadrant--bl" aria-label="持仓">
      <header class="quadrant__head">持仓管理</header>
      <div class="quadrant__stub">ISW-13 占位</div>
    </section>

    <section class="quadrant quadrant--br" aria-label="资讯">
      <header class="quadrant__head">资讯与公告</header>
      <div class="quadrant__stub">ISW-12 占位</div>
    </section>
  </main>

  <aside id="detail-panel" class="detail-panel" aria-hidden="true">
    <button class="detail-panel__close" type="button" aria-label="关闭">×</button>
    <div class="detail-panel__body"></div>
  </aside>

  <div id="modal-root"></div>

  <script src="app.js" defer></script>
</body>
</html>
